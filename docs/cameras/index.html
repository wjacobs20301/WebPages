<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAM Highway Cameras</title>
    <link rel="icon" href="http://github.wjacobs.space/cameras/logos/eam-logo-small.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0c1a1f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: linear-gradient(135deg, #0e2328, #091a1e);
            border-bottom: 2px solid #0e8c8c;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            height: 38px;
        }

        header h1 {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        header h1 span { color: #0e8c8c; }
        .header-sub {
            font-size: 0.65rem;
            color: #6b8a8a;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-refresh {
            padding: 6px 16px;
            background: #0e8c8c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-refresh:hover { background: #10a5a5; transform: translateY(-1px); }

        /* Tabs */
        .tab-bar {
            background: #0f2029;
            padding: 0 24px;
            display: flex;
            gap: 0;
            border-bottom: 1px solid #163038;
        }

        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #4e7a7a;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #7ab5b5;
            background: rgba(14,140,140,0.05);
        }

        .tab-btn.active {
            color: #0fb5b5;
            border-bottom-color: #0e8c8c;
            background: rgba(14,140,140,0.08);
        }

        .tab-btn .tab-label {
            display: block;
            font-size: 0.65rem;
            color: #3a6060;
            font-weight: 400;
            margin-top: 1px;
        }

        .tab-btn.active .tab-label {
            color: #0a7070;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 12px;
            padding: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .camera-card {
            background: #112a30;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1a3a40;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .camera-card:hover {
            border-color: #0e8c8c;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(14,140,140,0.15);
        }

        .card-header {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #133538, #0f2a30);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .cam-icon { font-size: 0.85rem; }

        .card-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #d0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-highway {
            font-size: 0.6rem;
            color: #0fb5b5;
            font-weight: 600;
        }

        .dir-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .dir-N { background: #0e3d2a; color: #5ec49e; }
        .dir-S { background: #3d1a1a; color: #d48a8a; }
        .dir-E { background: #0d2f4a; color: #6ab0d8; }
        .dir-W { background: #2d1a40; color: #b088cc; }
        .dir-other { background: #1a3038; color: #7a9a9a; }

        .img-wrap {
            position: relative;
            background: #081418;
        }

        .camera-card img {
            width: 100%;
            display: block;
        }

        .card-footer {
            padding: 4px 12px;
            font-size: 0.65rem;
            color: #3a6060;
            border-top: 1px solid #1a3a40;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
        }

        /* Fullscreen */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,20,24,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            cursor: zoom-out;
        }
        .overlay.active { display: flex; }
        .overlay img {
            max-width: 92vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        .overlay-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .overlay-sub {
            color: #0fb5b5;
            font-size: 0.85rem;
            margin-top: -6px;
        }
        .overlay-close {
            position: absolute;
            top: 14px; right: 22px;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            background: rgba(14,140,140,0.2);
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .overlay-close:hover { background: rgba(14,140,140,0.4); }
        .overlay-nav {
            display: flex; gap: 8px;
        }
        .overlay-nav button {
            padding: 7px 18px;
            background: rgba(14,140,140,0.15);
            color: #fff;
            border: 1px solid rgba(14,140,140,0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .overlay-nav button:hover { background: rgba(14,140,140,0.3); }

        @media (max-width: 700px) {
            .camera-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
                padding: 8px;
            }
            .card-header h3 { font-size: 0.7rem; }
            header h1 { font-size: 0.95rem; }
            .header-logo { height: 30px; }
            .tab-btn { padding: 8px 14px; font-size: 0.75rem; }
            .header-left { gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="http://github.wjacobs.space/cameras/logos/eam-logo-small.png" alt="EAM" class="header-logo" onerror="this.style.display='none'">
        <div>
            <h1><span>Highway</span> Cameras</h1>
            <div class="header-sub">Emil Anderson Maintenance</div>
        </div>
    </div>
    <button class="btn-refresh" onclick="refreshAll()">⟳ Refresh</button>
</header>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="fraser">SA 7 — Fraser Valley<span class="tab-label">17 cameras</span></button>
    <button class="tab-btn" data-tab="robson">SA 20 — Robson<span class="tab-label">10 cameras</span></button>
    <button class="tab-btn" data-tab="skeena">SA 26 — Skeena<span class="tab-label">15 cameras</span></button>
</div>

<div class="camera-grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeFull(event)">
    <div class="overlay-close" onclick="closeFull(event)">✕</div>
    <div class="overlay-title" id="oTitle"></div>
    <div class="overlay-sub" id="oSub"></div>
    <img id="oImg" src="" alt="">
    <div class="overlay-nav">
        <button onclick="navFull(event,-1)">◀ Prev</button>
        <button onclick="navFull(event,1)">Next ▶</button>
    </div>
</div>

<script>
const areas = {
    fraser: [
        { id:240, n:"Bridal Falls", d:"E", hwy:"Hwy 1" },
        { id:325, n:"Annis Road", d:"E", hwy:"Hwy 1" },
        { id:327, n:"Annis Road", d:"W", hwy:"Hwy 1" },
        { id:840, n:"Yale", d:"N", hwy:"Hwy 1" },
        { id:466, n:"Yale", d:"S", hwy:"Hwy 1" },
        { id:1112, n:"Allison Pass", d:"W", hwy:"Hwy 3" },
        { id:128, n:"Evans Road", d:"E", hwy:"Hwy 1" },
        { id:559, n:"Evans Road", d:"W", hwy:"Hwy 1" },
        { id:246, n:"Sunday Summit", d:"N", hwy:"Hwy 5A" },
        { id:1155, n:"Sunday Summit", d:"S", hwy:"Hwy 5A" },
        { id:383, n:"Hwy 3/5 Junction", d:"", hwy:"Hwy 3/5" },
        { id:467, n:"Hope Slide", d:"", hwy:"Hwy 3" },
        { id:204, n:"McCallum Road", d:"W", hwy:"Hwy 1" },
        { id:223, n:"McCallum Road", d:"E", hwy:"Hwy 1" },
        { id:242, n:"Agassiz", d:"", hwy:"Hwy 9" },
        { id:503, n:"Mission", d:"N", hwy:"Hwy 11" },
        { id:505, n:"Mission", d:"S", hwy:"Hwy 11" }
    ],
    robson: [
        { id:560, n:"BC-Alberta Border", d:"", hwy:"Hwy 16" },
        { id:495, n:"Messiter Summit", d:"", hwy:"Hwy 5" },
        { id:254, n:"Blue River", d:"", hwy:"Hwy 5" },
        { id:478, n:"Lempriere", d:"", hwy:"Hwy 5" },
        { id:216, n:"Crescent Spur", d:"", hwy:"Hwy 16" },
        { id:865, n:"West Twin", d:"E", hwy:"Hwy 16" },
        { id:864, n:"West Twin", d:"W", hwy:"Hwy 16" },
        { id:339, n:"Dunster Station Road", d:"", hwy:"Hwy 16" },
        { id:483, n:"Tete Jaune Cache", d:"", hwy:"Hwy 16" },
        { id:141, n:"Red Pass", d:"", hwy:"Hwy 16" }
    ],
    skeena: [
        { id:593, n:"Kwinitsa", d:"", hwy:"Hwy 16" },
        { id:146, n:"Kasiks", d:"", hwy:"Hwy 16" },
        { id:111, n:"Terrace", d:"E", hwy:"Hwy 16" },
        { id:286, n:"Chimdemash", d:"", hwy:"Hwy 16" },
        { id:382, n:"Grizzly Hill", d:"", hwy:"Hwy 37" },
        { id:200, n:"Laxgalts'ap", d:"", hwy:"Nisga'a Hwy" },
        { id:335, n:"Gitwinksihlkw", d:"", hwy:"Nisga'a Hwy" },
        { id:491, n:"Rosswood", d:"", hwy:"Kalum Lake Dr" },
        { id:"shames", n:"Shames Mountain", d:"", hwy:"Shames Mtn Rd", url:"https://storage.googleapis.com/shames_webcam_images/camera2-latest-timestamp.png" },
        { id:144, n:"Onion Lake", d:"", hwy:"Hwy 37" },
        { id:110, n:"Kitimat", d:"", hwy:"Hwy 37" },
        { id:566, n:"Rainbow Summit Chain-Up", d:"", hwy:"Hwy 37" },
        { id:172, n:"Tlell", d:"", hwy:"Hwy 16" },
        { id:143, n:"Kitwanga", d:"W", hwy:"Hwy 16" },
        { id:378, n:"New Hazelton", d:"", hwy:"Hwy 16" }
    ]
};

let activeTab = 'fraser';
let activeCams = [];
let idx = -1;

const grid = document.getElementById('grid');
const dirFull = { N:"North", S:"South", E:"East", W:"West" };

function label(c) { return c.n + (c.d ? ' — ' + dirFull[c.d] : ''); }

function imgUrl(c) {
    if (c.url) return c.url;
    return `https://images.drivebc.ca/bchighwaycam/pub/cameras/${c.id}.jpg`;
}

function renderGrid(tab) {
    activeTab = tab;
    activeCams = areas[tab];
    grid.innerHTML = '';

    activeCams.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'camera-card';
        const dc = c.d ? 'dir-' + c.d : 'dir-other';
        const badge = c.d ? `<span class="dir-badge ${dc}">${c.d}</span>` : '';
        const camId = typeof c.id === 'number' ? `CAM #${c.id}` : c.id.toUpperCase();

        card.innerHTML = `
            <div class="card-header">
                <div class="card-title">
                    <span class="cam-icon">📷</span>
                    <div>
                        <h3>${c.n}${c.d ? ' - ' + c.d : ''}</h3>
                        <div class="card-highway">${c.hwy}</div>
                    </div>
                </div>
                ${badge}
            </div>
            <div class="img-wrap">
                <img src="${imgUrl(c)}?t=${Date.now()}" alt="${label(c)}" loading="lazy"
                     onerror="this.style.opacity=0.2">
            </div>
            <div class="card-footer">
                <span>${camId}</span>
                <span>🕐 Live</span>
            </div>`;
        card.onclick = () => openFull(i);
        grid.appendChild(card);
    });
}

function refreshAll() {
    document.querySelectorAll('.camera-card img').forEach((img, i) => {
        img.src = imgUrl(activeCams[i]) + '?t=' + Date.now();
        img.style.opacity = '';
    });
}

setInterval(refreshAll, 300000);

// Tabs
document.getElementById('tabBar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.tab);
});

// Fullscreen
function openFull(i) {
    idx = i;
    const c = activeCams[i];
    document.getElementById('oTitle').textContent = label(c);
    const camId = typeof c.id === 'number' ? 'CAM #' + c.id : c.id.toUpperCase();
    document.getElementById('oSub').textContent = c.hwy + '  •  ' + camId;
    document.getElementById('oImg').src = imgUrl(c) + '?t=' + Date.now();
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeFull(e) {
    if (e.target.id === 'overlay' || e.target.classList.contains('overlay-close')) {
        document.getElementById('overlay').classList.remove('active');
        document.body.style.overflow = '';
    }
}

function navFull(e, d) {
    e.stopPropagation();
    idx = (idx + d + activeCams.length) % activeCams.length;
    const c = activeCams[idx];
    document.getElementById('oTitle').textContent = label(c);
    const camId = typeof c.id === 'number' ? 'CAM #' + c.id : c.id.toUpperCase();
    document.getElementById('oSub').textContent = c.hwy + '  •  ' + camId;
    document.getElementById('oImg').src = imgUrl(c) + '?t=' + Date.now();
}

document.addEventListener('keydown', e => {
    const o = document.getElementById('overlay');
    if (!o.classList.contains('active')) return;
    if (e.key === 'Escape') { o.classList.remove('active'); document.body.style.overflow = ''; }
    if (e.key === 'ArrowLeft') navFull(e, -1);
    if (e.key === 'ArrowRight') navFull(e, 1);
});

renderGrid('fraser');
</script>
</body>
</html>
