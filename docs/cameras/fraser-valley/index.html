<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAM Highway Cameras</title>
    <link rel="icon" href="http://github.wjacobs.space/cameras/logos/eam-logo-small.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0c1a1f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: linear-gradient(135deg, #0e2328, #091a1e);
            border-bottom: 2px solid #0e8c8c;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo { height: 38px; }

        header h1 {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 700;
        }
        header h1 span { color: #0e8c8c; }
        .header-sub {
            font-size: 0.65rem;
            color: #6b8a8a;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-refresh {
            padding: 6px 16px;
            background: #0e8c8c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-refresh:hover { background: #10a5a5; transform: translateY(-1px); }

        .tab-bar {
            background: #0f2029;
            padding: 0 24px;
            display: flex;
            gap: 0;
            border-bottom: 1px solid #163038;
        }

        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #4e7a7a;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #7ab5b5;
            background: rgba(14,140,140,0.05);
        }

        .tab-btn.active {
            color: #0fb5b5;
            border-bottom-color: #0e8c8c;
            background: rgba(14,140,140,0.08);
        }

        .tab-btn .tab-label {
            display: block;
            font-size: 0.65rem;
            color: #3a6060;
            font-weight: 400;
            margin-top: 1px;
        }

        .tab-btn.active .tab-label { color: #0a7070; }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 12px;
            padding: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .camera-card {
            background: #112a30;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1a3a40;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .camera-card:hover {
            border-color: #0e8c8c;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(14,140,140,0.15);
        }

        .card-header {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #133538, #0f2a30);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .cam-icon { font-size: 0.85rem; }

        .card-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #d0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-highway {
            font-size: 0.6rem;
            color: #0fb5b5;
            font-weight: 600;
        }

        .img-wrap {
            position: relative;
            background: #081418;
        }

        .camera-card img {
            width: 100%;
            display: block;
        }

        .card-footer {
            padding: 4px 12px;
            font-size: 0.65rem;
            color: #3a6060;
            border-top: 1px solid #1a3a40;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
        }

        /* Fullscreen overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,20,24,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .overlay.active { display: flex; }

        .overlay-content {
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            cursor: default;
        }

        .overlay-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #133538, #0f2a30);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .overlay-header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .overlay-title {
            color: #fff;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .overlay-sub {
            color: #0fb5b5;
            font-size: 0.8rem;
        }

        .overlay-close {
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            background: rgba(14,140,140,0.2);
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .overlay-close:hover { background: rgba(14,140,140,0.4); }

        .overlay-img-wrap {
            background: #081418;
            line-height: 0;
        }

        .overlay-img-wrap img {
            display: block;
        }

        .overlay-footer {
            padding: 10px 20px;
            background: #112a30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .overlay-footer button {
            padding: 8px 24px;
            background: rgba(14,140,140,0.15);
            color: #fff;
            border: 1px solid rgba(14,140,140,0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .overlay-footer button:hover { background: rgba(14,140,140,0.3); }

        .overlay-counter {
            color: #4e7a7a;
            font-size: 0.8rem;
            min-width: 60px;
            text-align: center;
        }

        @media (max-width: 700px) {
            .camera-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
                padding: 8px;
            }
            .card-header h3 { font-size: 0.7rem; }
            header h1 { font-size: 0.95rem; }
            .header-logo { height: 30px; }
            .tab-btn { padding: 8px 14px; font-size: 0.75rem; }
            .overlay-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="http://github.wjacobs.space/cameras/logos/eam-logo-small.png" alt="EAM" class="header-logo" onerror="this.style.display='none'">
        <div>
            <h1><span>Highway</span> Cameras</h1>
            <div class="header-sub">Emil Anderson Maintenance</div>
        </div>
    </div>
    <button class="btn-refresh" onclick="refreshAll()">⟳ Refresh</button>
</header>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn" data-tab="fraser-valley">SA 7 — Fraser Valley<span class="tab-label">17 cameras</span></button>
    <button class="tab-btn" data-tab="robson">SA 20 — Robson<span class="tab-label">10 cameras</span></button>
    <button class="tab-btn" data-tab="skeena">SA 26 — Skeena<span class="tab-label">15 cameras</span></button>
</div>

<div class="camera-grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeFull(event)">
    <div class="overlay-content" id="overlayContent" onclick="event.stopPropagation()">
        <div class="overlay-header">
            <div class="overlay-header-left">
                <div class="overlay-title" id="oTitle"></div>
                <div class="overlay-sub" id="oSub"></div>
            </div>
            <div class="overlay-close" onclick="forceClose()">✕</div>
        </div>
        <div class="overlay-img-wrap">
            <img id="oImg" src="" alt="">
        </div>
        <div class="overlay-footer">
            <button onclick="navFull(-1)">◀ Prev</button>
            <span class="overlay-counter" id="oCounter"></span>
            <button onclick="navFull(1)">Next ▶</button>
        </div>
    </div>
</div>

<script>
const BASE_PATH = '/cameras/';

const areas = {
    'fraser-valley': [
        { n:"Bridal Falls - E", hwy:"Hwy 1", id:240 },
        { n:"Annis Road - E", hwy:"Hwy 1", id:325 },
        { n:"Annis Road - W", hwy:"Hwy 1", id:327 },
        { n:"Yale - N", hwy:"Hwy 1", id:840 },
        { n:"Yale - S", hwy:"Hwy 1", id:466 },
        { n:"Allison Pass - W", hwy:"Hwy 3", id:1112 },
        { n:"Evans Road - E", hwy:"Hwy 1", id:128 },
        { n:"Evans Road - W", hwy:"Hwy 1", id:559 },
        { n:"Sunday Summit - N", hwy:"Hwy 5A", id:246 },
        { n:"Sunday Summit - S", hwy:"Hwy 5A", id:1155 },
        { n:"Hwy 3 at Highway 3/5 Junction", hwy:"Hwy 3/5", id:383 },
        { n:"Hope Slide", hwy:"Hwy 3", id:467 },
        { n:"McCallum Road - W", hwy:"Hwy 1", id:204 },
        { n:"McCallum Road - E", hwy:"Hwy 1", id:223 },
        { n:"Agassiz", hwy:"Hwy 9", id:242 },
        { n:"Mission - N", hwy:"Hwy 11", id:503 },
        { n:"Mission - S", hwy:"Hwy 11", id:505 }
    ],
    robson: [
        { n:"BC-Alberta Border", hwy:"Hwy 16", id:560 },
        { n:"Messiter Summit", hwy:"Hwy 5", id:495 },
        { n:"Blue River", hwy:"Hwy 5", id:254 },
        { n:"Lempriere", hwy:"Hwy 5", id:478 },
        { n:"Crescent Spur", hwy:"Hwy 16", id:216 },
        { n:"West Twin - E", hwy:"Hwy 16", id:865 },
        { n:"West Twin - W", hwy:"Hwy 16", id:864 },
        { n:"Dunster Station Road", hwy:"Hwy 16", id:339 },
        { n:"Tete Jaune Cache", hwy:"Hwy 16", id:483 },
        { n:"Red Pass", hwy:"Hwy 16", id:141 }
    ],
    skeena: [
        { n:"Kwinitsa", hwy:"Hwy 16", id:593 },
        { n:"Kasiks", hwy:"Hwy 16", id:146 },
        { n:"Terrace - E", hwy:"Hwy 16", id:111 },
        { n:"Chimdemash", hwy:"Hwy 16", id:286 },
        { n:"Grizzly Hill", hwy:"Hwy 37", id:382 },
        { n:"Laxgalts'ap", hwy:"Nisga'a Hwy", id:200 },
        { n:"Gitwinksihlkw", hwy:"Nisga'a Hwy", id:335 },
        { n:"Rosswood", hwy:"Kalum Lake Dr", id:491 },
        { n:"Shames Mountain", hwy:"Shames Mtn Rd", id:"shames", url:"https://storage.googleapis.com/shames_webcam_images/camera2-latest-timestamp.png" },
        { n:"Onion Lake", hwy:"Hwy 37", id:144 },
        { n:"Kitimat", hwy:"Hwy 37", id:110 },
        { n:"Rainbow Summit Chain-Up Area", hwy:"Hwy 37", id:566 },
        { n:"Tlell", hwy:"Hwy 16", id:172 },
        { n:"Kitwanga - W", hwy:"Hwy 16", id:143 },
        { n:"New Hazelton", hwy:"Hwy 16", id:378 }
    ]
};

const tabTitles = {
    'fraser-valley': 'Fraser Valley',
    'robson': 'Robson',
    'skeena': 'Skeena'
};

let activeTab = '';
let activeCams = [];
let idx = -1;
const grid = document.getElementById('grid');

function imgUrl(c) {
    if (c.url) return c.url;
    return `https://images.drivebc.ca/bchighwaycam/pub/cameras/${c.id}.jpg`;
}

function getTabFromURL() {
    const path = window.location.pathname.replace(BASE_PATH, '').replace(/\/$/, '');
    if (areas[path]) return path;
    return 'fraser-valley';
}

function switchTab(tab, pushState) {
    if (!areas[tab]) tab = 'fraser-valley';
    activeTab = tab;
    activeCams = areas[tab];

    if (pushState) {
        history.pushState({ tab: tab }, '', BASE_PATH + tab);
    }

    document.title = `EAM Cameras — ${tabTitles[tab]}`;

    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
    });

    grid.innerHTML = '';
    activeCams.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'camera-card';
        const camId = typeof c.id === 'number' ? `CAM #${c.id}` : c.id.toUpperCase();

        card.innerHTML = `
            <div class="card-header">
                <div class="card-title">
                    <span class="cam-icon">📷</span>
                    <div>
                        <h3>${c.n}</h3>
                        <div class="card-highway">${c.hwy}</div>
                    </div>
                </div>
            </div>
            <div class="img-wrap">
                <img src="${imgUrl(c)}?t=${Date.now()}" alt="${c.n}" loading="lazy"
                     onerror="this.style.opacity=0.2">
            </div>
            <div class="card-footer">
                <span>${camId}</span>
                <span>🕐 Live</span>
            </div>`;
        card.onclick = () => openFull(i);
        grid.appendChild(card);
    });
}

function refreshAll() {
    document.querySelectorAll('.camera-card img').forEach((img, i) => {
        img.src = imgUrl(activeCams[i]) + '?t=' + Date.now();
        img.style.opacity = '';
    });
}

setInterval(refreshAll, 300000);

document.getElementById('tabBar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    switchTab(btn.dataset.tab, true);
});

window.addEventListener('popstate', e => {
    const tab = (e.state && e.state.tab) ? e.state.tab : getTabFromURL();
    switchTab(tab, false);
});

function sizeOverlay() {
    const img = document.getElementById('oImg');
    const content = document.getElementById('overlayContent');
    const maxW = window.innerWidth * 0.8;
    const maxH = window.innerHeight * 0.8;
    const headerFooterH = 100; // approx height of header + footer
    const maxImgH = maxH - headerFooterH;

    const natW = img.naturalWidth || 640;
    const natH = img.naturalHeight || 480;
    const ratio = natW / natH;

    let imgW = maxW;
    let imgH = imgW / ratio;

    if (imgH > maxImgH) {
        imgH = maxImgH;
        imgW = imgH * ratio;
    }

    content.style.width = imgW + 'px';
    img.style.width = imgW + 'px';
    img.style.height = imgH + 'px';
}

function updateOverlay() {
    const c = activeCams[idx];
    document.getElementById('oTitle').textContent = c.n;
    const camId = typeof c.id === 'number' ? 'CAM #' + c.id : c.id.toUpperCase();
    document.getElementById('oSub').textContent = c.hwy + '  •  ' + camId;

    const img = document.getElementById('oImg');
    img.onload = sizeOverlay;
    img.src = imgUrl(c) + '?t=' + Date.now();
    document.getElementById('oCounter').textContent = (idx + 1) + ' / ' + activeCams.length;
}

function openFull(i) {
    idx = i;
    updateOverlay();
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function forceClose() {
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
}

function closeFull(e) {
    if (e.target.id === 'overlay') forceClose();
}

function navFull(d) {
    idx = (idx + d + activeCams.length) % activeCams.length;
    updateOverlay();
}

window.addEventListener('resize', () => {
    if (document.getElementById('overlay').classList.contains('active')) {
        sizeOverlay();
    }
});

document.addEventListener('keydown', e => {
    const o = document.getElementById('overlay');
    if (!o.classList.contains('active')) return;
    if (e.key === 'Escape') forceClose();
    if (e.key === 'ArrowLeft') navFull(-1);
    if (e.key === 'ArrowRight') navFull(1);
});

const initialTab = getTabFromURL();
history.replaceState({ tab: initialTab }, '', BASE_PATH + initialTab);
switchTab(initialTab, false);
</script>
</body>
</html>
