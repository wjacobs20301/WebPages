<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Jacobs</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 1;
            padding: 2rem;
        }

        .greeting {
            font-size: 1.1rem;
            color: #58a6ff;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.2s;
        }

        .name {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #58a6ff, #bc8cff, #39d353);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.4s, gradient 6s ease infinite;
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: #8b949e;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.6s;
        }

        .tagline .cursor {
            border-right: 2px solid #58a6ff;
            padding-right: 3px;
            animation: blink 1s step-end infinite;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.8s;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #8b949e;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .links a:hover {
            border-color: #58a6ff;
            color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .links a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="content">
        <p class="greeting">👋 Hey there, I'm</p>
        <h1 class="name">William Jacobs</h1>
        <p class="tagline"><span class="cursor" id="typed"></span></p>
        <div class="links">
            <a href="https://github.com/wjacobs20301" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </a>
        </div>
    </div>

    <script>
        // Typing effect
        const phrases = ["Welcome to my GitHub.", "Thanks for stopping by."];
        let i = 0, j = 0, deleting = false;
        const el = document.getElementById('typed');

        function type() {
            const text = phrases[i];
            el.textContent = deleting
                ? text.substring(0, --j)
                : text.substring(0, ++j);

            let speed = deleting ? 35 : 70;
            if (!deleting && j === text.length) { speed = 2000; deleting = true; }
            else if (deleting && j === 0) { deleting = false; i = (i + 1) % phrases.length; speed = 400; }

            setTimeout(type, speed);
        }
        setTimeout(type, 1000);

        // Particles
        const c = document.getElementById('bg');
        const ctx = c.getContext('2d');
        let dots = [];

        function resize() {
            c.width = innerWidth;
            c.height = innerHeight;
            dots = Array.from({ length: Math.min(60, (innerWidth * innerHeight) / 20000) }, () => ({
                x: Math.random() * c.width,
                y: Math.random() * c.height,
                r: Math.random() * 1.5 + 0.5,
                dx: (Math.random() - 0.5) * 0.4,
                dy: (Math.random() - 0.5) * 0.4,
                o: Math.random() * 0.4 + 0.1
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            dots.forEach(d => {
                d.x += d.dx; d.y += d.dy;
                if (d.x < 0) d.x = c.width;
                if (d.x > c.width) d.x = 0;
                if (d.y < 0) d.y = c.height;
                if (d.y > c.height) d.y = 0;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(88,166,255,${d.o})`;
                ctx.fill();
            });
            for (let a = 0; a < dots.length; a++)
                for (let b = a + 1; b < dots.length; b++) {
                    const dist = Math.hypot(dots[a].x - dots[b].x, dots[a].y - dots[b].y);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(dots[a].x, dots[a].y);
                        ctx.lineTo(dots[b].x, dots[b].y);
                        ctx.strokeStyle = `rgba(88,166,255,${(1 - dist / 120) * 0.12})`;
                        ctx.stroke();
                    }
                }
            requestAnimationFrame(draw);
        }

        resize();
        draw();
        addEventListener('resize', resize);
    </script>

</body>
</html>
